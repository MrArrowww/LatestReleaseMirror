name: Sync latest releases & update README

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

concurrency:
  group: sync-releases
  cancel-in-progress: false

jobs:
  sync-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # -------------------- CLEANUP ORPHANED REPOS & MISMATCHED ASSETS --------------------
      - name: Cleanup orphaned repos and mismatched assets
        run: |
          # Load expected repos from repos.txt
          declare -A EXPECTED_REPOS
          declare -A FILTERS
          while IFS='|' read -r repo_path filter_pattern; do
            repo_path=$(echo "$repo_path" | xargs)
            [[ -z "$repo_path" || "$repo_path" =~ ^# ]] && continue
            EXPECTED_REPOS["$repo_path"]=1
            FILTERS["$repo_path"]="$filter_pattern"
          done < repos.txt

          # 1) Delete entire folders for repos no longer in repos.txt
          if [ -d releases ]; then
            find releases -type f -name ".version" -printf "%h\n" | sort -u | while read -r repo_dir; do
              # repo_dir is like releases/owner/repo/stable or releases/owner/repo/prerelease
              # We need to check the parent (owner/repo) level
              status_dir=$(basename "$repo_dir")
              repo=$(basename "$(dirname "$repo_dir")")
              owner=$(basename "$(dirname "$(dirname "$repo_dir")")")
              full_repo="$owner/$repo"
              if [ -z "${EXPECTED_REPOS[$full_repo]}" ]; then
                echo "Removing orphaned repository: $repo_dir"
                git rm -rf "$repo_dir"
              fi
            done
          fi

          # 2) For each expected repo, delete assets that no longer match the current filter
          for full_repo in "${!EXPECTED_REPOS[@]}"; do
            owner="${full_repo%%/*}"
            repo="${full_repo#*/}"
            repo_dir="releases/$owner/$repo"
            if [ ! -d "$repo_dir" ]; then
              continue
            fi
            current_filter="${FILTERS[$full_repo]}"
            if [ -z "$current_filter" ]; then
              continue
            fi
            # Delete assets that do NOT match the current filter (check in both stable and prerelease)
            for status_dir in "$repo_dir/stable" "$repo_dir/prerelease"; do
              [ ! -d "$status_dir" ] && continue
              find "$status_dir" -type f ! -name ".version" ! -name "release.json" ! -name ".filter" -printf "%f\n" | while read -r asset; do
                if ! echo "$asset" | grep -qiE "$current_filter"; then
                  echo "  Deleting mismatched asset: $status_dir/$asset"
                  git rm "$status_dir/$asset"
                fi
              done
            done
          done

          # Commit all deletions in one commit (clean and safe)
          git add -A
          git diff --staged --quiet || git commit -m "Cleanup: remove orphaned repos and mismatched assets"
          git push || echo "Push failed (maybe nothing to push)"

      # -------------------- SYNC RELEASES --------------------
      - name: Sync releases
        run: |
          set -e
          trap 'echo "Error on line $LINENO, exit code $?"' ERR

          git pull --rebase origin HEAD

          if [ ! -f repos.txt ]; then
            echo "ERROR: repos.txt not found."
            exit 1
          fi

          # ---- تابع پردازش و دانلود یک release ----
          process_release() {
            local release_json="$1"
            local repo_path="$2"
            local base_dir="$3"
            local filter_pattern="$4"

            [ -z "$release_json" ] || [ "$release_json" = "null" ] && return

            local tag prerelease date_raw status target_dir
            tag=$(echo "$release_json" | jq -r '.tag_name')
            prerelease=$(echo "$release_json" | jq -r '.prerelease')
            date_raw=$(echo "$release_json" | jq -r '.published_at')
            status="stable"
            [[ "$prerelease" == "true" ]] && status="prerelease"

            target_dir="$base_dir/$status"
            mkdir -p "$target_dir"

            # Check stored version and filter
            local current_version stored_filter
            current_version=""
            [ -f "$target_dir/.version" ] && current_version=$(cat "$target_dir/.version")
            stored_filter=""
            [ -f "$target_dir/.filter" ] && stored_filter=$(cat "$target_dir/.filter")

            if [ "$current_version" = "$tag" ] && [ "$stored_filter" = "$filter_pattern" ]; then
              echo "  [$status] Already up to date: $tag"
              return
            fi

            echo "  [$status] New release: $tag (previous: $current_version) or filter changed"

            # Delete old assets
            find "$target_dir" -type f ! -name '.version' ! -name '.filter' -delete 2>/dev/null || true

            echo "  [$status] Downloading matching assets..."
            while read -r url; do
              local filename size filepath file_size
              filename=$(basename "$url")
              size=$(curl -sL -I "$url" | grep -i content-length | tail -1 | awk '{print $2}' | tr -d '\r')
              if [ -n "$size" ] && [ "$size" -gt 104857600 ]; then
                echo "    File $filename is ${size} bytes (>100 MB) – will split after download"
              fi
              echo "    Downloading $filename"
              wget -q --show-progress "$url" -P "$target_dir"

              filepath="$target_dir/$filename"
              if [ -f "$filepath" ]; then
                file_size=$(stat -c%s "$filepath" 2>/dev/null || stat -f%z "$filepath" 2>/dev/null)
                if [ -n "$file_size" ] && [ "$file_size" -gt 104857600 ]; then
                  echo "  File larger than 100 MB (${file_size} bytes). Splitting into 90 MB parts..."
                  (
                    cd "$target_dir"
                    if split --help 2>&1 | grep -q -- "--numeric-suffixes"; then
                      split -b 90m --numeric-suffixes=1 -a 3 "$filename" "${filename}."
                    else
                      split -b 90m -d -a 3 "$filename" "${filename}."
                      files=($(ls "${filename}."??? | sort))
                      for i in "${!files[@]}"; do
                        new=$(printf "%s.%03d" "$filename" $((i+1)))
                        mv "${files[$i]}" "$new"
                      done
                    fi
                    if ls "${filename}."??? 1>/dev/null 2>&1; then
                      rm "$filename"
                      echo "  Split done. Parts: $(ls "${filename}."??? 2>/dev/null | wc -l) files (starting from .001)"
                    else
                      echo "  Splitting failed for $filename"
                    fi
                  ) || echo "  Splitting failed for $filename"
                fi
              fi
            done < <(curl -s "https://api.github.com/repos/$repo_path/releases/tags/$tag" \
              | jq -r --arg pat "$filter_pattern" '.assets[].browser_download_url | select(test($pat; "i"))')

            echo "$tag" > "$target_dir/.version"
            echo "$filter_pattern" > "$target_dir/.filter"

            printf '{\n' > "$target_dir/release.json"
            printf '  "tag": "%s",\n' "$tag" >> "$target_dir/release.json"
            printf '  "status": "%s",\n' "$status" >> "$target_dir/release.json"
            printf '  "published_at": "%s",\n' "$date_raw" >> "$target_dir/release.json"
            printf '  "filter_pattern": "%s",\n' "$filter_pattern" >> "$target_dir/release.json"
            printf '  "updated_at": "%s"\n' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$target_dir/release.json"
            printf '}\n' >> "$target_dir/release.json"

            git add "$target_dir"
            git commit -m "Update $repo_path [$status] to $tag (filter: $filter_pattern)"
            echo "  [$status] Committed: $repo_path -> $tag"
          }

          grep -v '^#' repos.txt | grep -v '^[[:space:]]*$' | while IFS='|' read -r repo_path filter_pattern; do
            repo_path=$(echo "$repo_path" | xargs)
            filter_pattern=$(echo "$filter_pattern" | xargs)

            echo "========================================="
            echo "Repo: $repo_path"
            echo "Filter: $filter_pattern"

            owner=$(echo "$repo_path" | cut -d'/' -f1)
            repo_name=$(echo "$repo_path" | cut -d'/' -f2)
            base_dir="releases/$owner/$repo_name"
            mkdir -p "$base_dir"

            # دریافت لیست releases
            all_releases=$(curl -s --fail "https://api.github.com/repos/$repo_path/releases")
            if [ -z "$all_releases" ] || [ "$all_releases" = "null" ] || [ "$all_releases" = "[]" ]; then
              echo "  No releases found, skipping."
              continue
            fi

            # آخرین stable
            stable_json=$(echo "$all_releases" | jq '[.[] | select(.prerelease == false)] | .[0]')
            # آخرین prerelease
            prerelease_json=$(echo "$all_releases" | jq '[.[] | select(.prerelease == true)] | .[0]')

            process_release "$stable_json" "$repo_path" "$base_dir" "$filter_pattern"
            process_release "$prerelease_json" "$repo_path" "$base_dir" "$filter_pattern"

          done

          git push
          echo "All updates pushed."

      # -------------------- UPDATE README --------------------
      - name: Update README between markers
        run: |
          # If README.md does not exist, create it from docs/README.fa.md
          if [ ! -f README.md ]; then
            if [ ! -f docs/README.fa.md ]; then
              echo "ERROR: docs/README.fa.md not found – cannot create README.md"
              exit 1
            fi
            cp docs/README.fa.md README.md
            if ! grep -q "<!-- RELEASES_START -->" README.md; then
              printf '\n<!-- RELEASES_START -->\n' >> README.md
              printf '<!-- RELEASES_END -->\n' >> README.md
            fi
          fi

          if ! grep -q "<!-- RELEASES_START -->" README.md; then
            printf '\n<!-- RELEASES_START -->\n' >> README.md
            printf '<!-- RELEASES_END -->\n' >> README.md
          fi

          # ------------------------------------------------------------
          # Build a mapping of multipart part counts
          # ------------------------------------------------------------
          declare -A PART_COUNTS
          while read -r asset_path; do
            asset=$(basename "$asset_path")
            [[ "$asset" == ".version" || "$asset" == "release.json" || "$asset" == ".filter" ]] && continue
            if [[ "$asset" =~ \.[0-9]{3}$ ]]; then
              base="${asset%.???}"
              PART_COUNTS["$base"]=$(( ${PART_COUNTS["$base"]} + 1 ))
            fi
          done < <(find releases -type f)

          # ------------------------------------------------------------
          # Generate the release table
          # ساختار جدید: releases/owner/repo/stable  و  releases/owner/repo/prerelease
          # ------------------------------------------------------------
          TABLE=$(mktemp)
          first_repo=true

          # پیدا کردن همه repo ها (سطح owner/repo)
          find releases -mindepth 2 -maxdepth 2 -type d | sort | while read -r repo_base; do
            owner=$(basename "$(dirname "$repo_base")")
            repo=$(basename "$repo_base")
            url="https://github.com/$owner/$repo"
            anchor=$(echo "${owner}--${repo}" | tr '[:upper:]' '[:lower:]')

            # بررسی اینکه حداقل یه asset وجود داشته باشه
            asset_count=$(find "$repo_base" -type f ! -name ".version" ! -name "release.json" ! -name ".filter" | wc -l)
            [ "$asset_count" -eq 0 ] && continue

            if [ "$first_repo" = false ]; then
              echo "" >> "$TABLE"
              echo "---" >> "$TABLE"
              echo "" >> "$TABLE"
            fi
            first_repo=false

            echo "<div id=\"$anchor\"></div>" >> "$TABLE"
            echo "" >> "$TABLE"
            echo "### $owner--$repo" >> "$TABLE"
            echo "" >> "$TABLE"
            echo "🔗 [source]($url)" >> "$TABLE"
            echo "" >> "$TABLE"

            # هر دو نوع stable و prerelease رو نشون بده
            for status_type in stable prerelease; do
              status_dir="$repo_base/$status_type"
              [ ! -d "$status_dir" ] && continue
              [ ! -f "$status_dir/.version" ] && continue

              asset_count=$(find "$status_dir" -type f ! -name ".version" ! -name "release.json" ! -name ".filter" | wc -l)
              [ "$asset_count" -eq 0 ] && continue

              tag=$(cat "$status_dir/.version")

              if [ "$status_type" = "stable" ]; then
                echo "#### 🟢 Stable – [<code><small>$tag</small></code>](https://github.com/$owner/$repo/releases/tag/$tag)" >> "$TABLE"
              else
                echo "#### 🟡 Pre-release – [<code><small>$tag</small></code>](https://github.com/$owner/$repo/releases/tag/$tag)" >> "$TABLE"
              fi
              echo "" >> "$TABLE"
              echo "| File | Size | Download |" >> "$TABLE"
              echo "|------|------|----------|" >> "$TABLE"

              find "$status_dir" -type f ! -name ".version" ! -name "release.json" ! -name ".filter" -printf "%f\n" | sort -V | while read -r asset; do
                asset_path="$status_dir/$asset"
                size=$(stat -c%s "$asset_path" 2>/dev/null || stat -f%z "$asset_path" 2>/dev/null)
                if [ "$size" -lt 1048576 ]; then
                  s="$((size/1024)) KB"
                else
                  sm=$(echo "scale=1; $size / 1048576" | bc)
                  s="${sm} MB"
                fi
                link="https://raw.githubusercontent.com/${{ github.repository }}/main/$asset_path"

                if [[ "$asset" =~ \.[0-9]{3}$ ]]; then
                  base="${asset%.???}"
                  total_parts=${PART_COUNTS["$base"]}
                  part_num=${asset##*.}
                  part_num=$((10#$part_num))
                  display_name="$base (part $part_num of $total_parts)"
                  download_label="⬇️ Download (Part $part_num)"
                else
                  display_name="$asset"
                  download_label="⬇️ Download"
                fi

                echo "| \`$display_name\` | $s | [$download_label]($link) |" >> "$TABLE"
              done
              echo "" >> "$TABLE"
            done
          done

          # Replace content between markers using awk
          awk -v start="<!-- RELEASES_START -->" -v end="<!-- RELEASES_END -->" -v new="$(cat "$TABLE")" '
            BEGIN { p=1 }
            $0 == start { print; print new; p=0; next }
            $0 == end { p=1; print; next }
            p==1 { print }
          ' README.md > README.tmp && mv README.tmp README.md

          git add README.md
          git diff --staged --quiet || git commit -m "Update README between markers"
          git push
